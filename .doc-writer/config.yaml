# .doc-writer/config.yaml — generated by /doc-writer:setup
version: 1
plugin_version: "1.6.0"

user_personas:
  - name: "Python backend engineers"
    skill_level: "intermediate-advanced"
    assumed_knowledge:
      - "Python"
      - "Arrow (RecordBatch/Table)"
      - "Pydantic v2 models"
      - "Web frameworks (FastAPI)"
      - "Data layer tools (ADBC, Flight SQL, Polars, Pandas)"
    never_assume:
      - "arrowmodel's API surface"
      - "Installation steps (PyO3/maturin-built package)"
      - "Supported Arrow type mappings"
      - "How to handle edge cases (nulls, nested types, aliases)"
    domain_context: "Backend/API development -- bridging data layer with web serving layer"
    discovery_story: "Searching for a faster way to go from Arrow to Pydantic, or hit the to_pylist() + model construction bottleneck and went looking for alternatives"
    user_tasks:
      - "Convert Arrow query results to Pydantic models"
      - "Integrate with FastAPI response serialization"
      - "Connect ADBC/Flight SQL/Polars outputs to API endpoints"

tone: "personality"

use_cases:
  - title: "Serialize Arrow data to JSON API responses"
    problem: "Data arrives in Arrow format (e.g. ADBC query results) and needs to be converted to structured Python objects for a JSON API response"
    capability: "arrowmodel converts Arrow RecordBatch/Table directly to Pydantic model instances via a tight Rust loop over Arrow buffers -- no intermediate Python dicts, typically 2x faster than pure-Python approaches"
    outcome: "Arrow query results are efficiently materialized as validated Pydantic models, ready to serialize as JSON API responses, with significantly less latency and allocation pressure"

use_cases_section: false

doc_system: "sphinx-shibuya"
api_reference: "sphinx-autoapi"

paths:
  docs_root: "docs/"
  source_root: "src/"

detected:
  language: "Python"
  doc_system: "mkdocs-material"
  existing_docs: true

qa_answers:
  navigation: "Sidebar only"
  api_docs: "sphinx-autoapi"
  features:
    - "Grids + cards"
    - "Tab sets"
    - "Dropdowns"
    - "Badges + buttons"
