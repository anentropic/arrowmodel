name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
      - "v[0-9]+.[0-9]+.[0-9]+[ab][0-9]*"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]*"
  workflow_dispatch:

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build-wheels:
    # One abi3 wheel per platform (works on CPython >= 3.11 thanks to the
    # abi3-py311 feature), built with maturin-action so linux uses manylinux
    # containers and macOS/Windows build natively. maturin auto-detects abi3
    # from the crate's pyo3 features, so no per-interpreter loop is needed.
    name: Wheel ${{ matrix.platform.runner }} ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64 }
          - { runner: ubuntu-latest, target: aarch64 }
          - { runner: macos-13, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: dist-wheel-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist/*.whl
          retention-days: 7

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          retention-days: 7

  validate:
    name: Validate distributions
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Test wheel installation (abi3 wheel resolves for this Python)
        run: |
          uv venv --python ${{ matrix.python-version }} test-env-wheel
          # Resolve by name from the local dir so the installer picks the wheel
          # matching this runner's platform + Python instead of every path.
          uv pip install --python test-env-wheel/bin/python \
            arrowmodel --no-index --find-links dist
          test-env-wheel/bin/python -c "import arrowmodel; print('Wheel installation OK')"

      - name: Test sdist installation (builds the extension from source)
        run: |
          uv venv --python ${{ matrix.python-version }} test-env-sdist
          uv pip install --python test-env-sdist/bin/python \
            arrowmodel --no-index --find-links dist --no-binary arrowmodel
          test-env-sdist/bin/python -c "import arrowmodel; print('Sdist installation OK')"

      - name: Check py.typed marker in wheel
        run: |
          wheel=$(ls dist/*.whl | head -1)
          unzip -l "$wheel" | grep "arrowmodel/py.typed" \
            || (echo "ERROR: py.typed marker missing" && exit 1)

  changelog:
    name: Generate changelog
    needs: [build-wheels]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload changelog
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: CHANGELOG.md

  publish:
    name: Publish to PyPI
    # Only publish for tag pushes -- a workflow_dispatch run builds and validates
    # the same artifacts without ever touching PyPI.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [quality, validate, changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: pypi
      url: https://pypi.org/p/arrowmodel
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Download changelog
        uses: actions/download-artifact@v8
        with:
          name: changelog

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          files: dist/*
