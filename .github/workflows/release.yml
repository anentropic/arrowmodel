name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
      - "v[0-9]+.[0-9]+.[0-9]+[ab][0-9]*"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]*"
  workflow_dispatch:

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  # Reuse the exact build + validate pipeline that also runs on PRs, so a release
  # builds nothing the PR check did not already exercise.
  build:
    uses: ./.github/workflows/build-dist.yml

  changelog:
    name: Generate changelog
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload changelog
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: CHANGELOG.md

  publish:
    name: Publish to PyPI
    # Only publish for tag pushes -- a workflow_dispatch run builds and validates
    # the same artifacts without ever touching PyPI.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [quality, build, changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: pypi
      url: https://pypi.org/p/arrowmodel
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Download changelog
        uses: actions/download-artifact@v8
        with:
          name: changelog

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          files: dist/*
