
# SETUP REQUIRED: In GitHub repo Settings > Pages > Source, select "GitHub Actions"
# This enables the actions/deploy-pages action to publish the site.
name: Docs

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync docs dependencies
        run: uv sync --locked --group docs

      - name: Build docs
        run: uv run --group docs sphinx-build -W -b html docs docs/_build/html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    # Deploy only from the main branch. Gating on the ref (not just the event)
    # also prevents a workflow_dispatch run from a non-main branch from
    # publishing to Pages; PRs are excluded too (their ref is refs/pull/*/merge).
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
