name: Build distributions

# Cross-platform wheel + sdist build and install-validation. This is the single
# source of truth for building the distributables, reused two ways:
#   - pull_request (path-filtered): so a build break on any platform is caught on
#     the PR branch, WITHOUT any of the release flow (no changelog/publish).
#   - workflow_call: invoked by release.yml on a tag, which then adds publish +
#     GitHub release on top of these same artifacts.
on:
  workflow_call:
  pull_request:
    paths:
      - "rust/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-dist.yml"

concurrency:
  # Keyed on the caller workflow so a Release-invoked run and a PR-triggered run
  # never cancel each other; older runs of the same PR are still superseded.
  group: build-dist-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    # One abi3 wheel per platform (works on CPython >= 3.11 thanks to the
    # abi3-py311 feature), built with maturin-action so linux uses manylinux
    # containers and macOS/Windows build natively. maturin auto-detects abi3
    # from the crate's pyo3 features, so no per-interpreter loop is needed.
    name: Wheel ${{ matrix.platform.runner }} ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64 }
          - { runner: ubuntu-latest, target: aarch64 }
          - { runner: macos-13, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: dist-wheel-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist/*.whl
          retention-days: 7

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          retention-days: 7

  validate:
    name: Validate distributions
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Test wheel installation (abi3 wheel resolves for this Python)
        run: |
          uv venv --python ${{ matrix.python-version }} test-env-wheel
          # Resolve arrowmodel by name from the local dir so the installer picks
          # the wheel matching this runner's platform + Python (not every path).
          # --only-binary arrowmodel forces the wheel artifact (never the sdist);
          # the index stays enabled so runtime deps (pydantic) resolve normally.
          uv pip install --python test-env-wheel/bin/python \
            arrowmodel --find-links dist --only-binary arrowmodel
          test-env-wheel/bin/python -c "import arrowmodel; print('Wheel installation OK')"

      - name: Test sdist installation (builds the extension from source)
        run: |
          uv venv --python ${{ matrix.python-version }} test-env-sdist
          # --no-binary arrowmodel forces a source build from the local sdist;
          # the index stays enabled so build deps (maturin) and runtime deps
          # (pydantic) resolve normally.
          uv pip install --python test-env-sdist/bin/python \
            arrowmodel --find-links dist --no-binary arrowmodel
          test-env-sdist/bin/python -c "import arrowmodel; print('Sdist installation OK')"

      - name: Check py.typed marker in wheel
        run: |
          wheel=$(ls dist/*.whl | head -1)
          unzip -l "$wheel" | grep "arrowmodel/py.typed" \
            || (echo "ERROR: py.typed marker missing" && exit 1)
